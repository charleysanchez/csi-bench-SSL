# CPC finetune + SWA. Trains 100 epochs then runs 20 SWA epochs.
# Use after identifying a good base setup (e.g. baseline or DANN).

training:
  epochs: 100
  patience: 15
  batch_size: 128
  num_workers: 8

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 1e-5

scheduler:
  name: warmup_cosine
  warmup_epochs: 5
  min_lr_ratio: 0.0

model_params:
  win_len: 500
  feature_size: 232

ood_techniques:
  mixup_alpha: 0.0
  swa_epochs: 20
  swa_lr: 1e-4
  label_smoothing: 0.1
