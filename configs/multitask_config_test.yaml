# General Pipeline Settings
pipeline: "multitask"  # or "supervised"
training_dir: "data/"
output_dir: "results/"
tasks: ["HumanActivityRecognition", "HumanIdentification", "ProximityRecognition"]
available_models: ["transformer"]

# Training Hyperparameters
training:
  epochs: 100
  patience: 20
  batch_size: 128
  num_workers: 8

# Optimizer Settings
optimizer:
  name: "adamw"
  lr: 0.0003
  weight_decay: 1e-5

# Learning Rate Scheduler
scheduler:
  name: "warmup_cosine"
  warmup_epochs: 10
  min_lr_ratio: 0.0

# Model Architecture
model_params:
  win_len: 500
  feature_size: 232
  emb_dim: 128
  depth: 4
  num_heads: 8
  dropout: 0.1
  head_dropout: 0.2
  patch_size: 4