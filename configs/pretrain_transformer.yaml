# General Pipeline Settings
pipeline: "pretrain"
all_tasks: true
training_dir: "data/"
output_dir: "pretrain_results/"
model: "transformer"

# Training Protocol
training:
  epochs: 100
  patience: 15
  batch_size: 128
  num_workers: 8

# Optimizer Settings
optimizer:
  name: "adamw"
  lr: 0.001
  weight_decay: 1e-5

# Learning Rate Scheduler
scheduler:
  name: "warmup_cosine"
  warmup_epochs: 5
  min_lr_ratio: 0.0

# Transformer Architecture
model_params:
  win_len: 500
  feature_size: 232
  emb_dim: 256
  depth: 4
  num_heads: 8
  dropout: 0.1