training:
  epochs: 30
  patience: 15
  batch_size: 32
  grad_clip: 1.0
  log_interval: 1

optimizer:
  name: adamw
  lr: 0.0005
  weight_decay: 1e-5

scheduler:
  name: warmup_cosine
  warmup_epochs: 5
  min_lr_ratio: 0.0

model_params:
  win_len: 500
  feature_size: 232
  emb_dim: 128
  dropout: 0.1
  depth: 4
